apiVersion: triggers.tekton.dev/v1
kind: TriggerBinding
metadata:
  name: bookstore-binding
spec:
  params:
    - name: git-repo-url
      # TODO EX288: GitHub push payload field — use repository URL, not html_url
      value: $(body.repository.html_url)

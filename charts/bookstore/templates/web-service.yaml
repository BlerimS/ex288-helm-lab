apiVersion: v1
kind: Service
metadata:
  name: {{ include "bookstore.fullname" . }}-web
  labels:
    {{- include "bookstore.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "bookstore.webSelectorLabels" . | nindent 4 }}

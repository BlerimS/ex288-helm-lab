apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bookstore.fullname" . }}-web
  labels:
    {{- include "bookstore.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "bookstore.webSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bookstore.webSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          command: ["httpd", "-D", "FOREGROUND"]
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            - name: web-config
              mountPath: /etc/httpd/conf.d/bookstore.conf
              subPath: bookstore.conf
            - name: web-config
              mountPath: /var/www/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: web-config
          configMap:
            name: {{ include "bookstore.fullname" . }}-web
